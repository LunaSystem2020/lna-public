name: Update Echo Mirror

on:
  schedule:
    # UTC基準。毎時47分に実行。
    # 日本時間でも「分」は同じなので、毎時47分ごろに動く。
    - cron: "47 * * * *"

  # Actions画面から手動実行できるようにする
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-echo-mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest echo JSON from GAS
        shell: bash
        env:
          ECHO_SOURCE_URL: ${{ secrets.ECHO_SOURCE_URL }}
        run: |
          set -euo pipefail

          mkdir -p echo

          if [ -z "${ECHO_SOURCE_URL:-}" ]; then
            echo "ECHO_SOURCE_URL secret is empty."
            exit 1
          fi

          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          src_path = Path("/tmp/echo_backup_latest.json")
          dst_path = Path("echo/echo_backup_latest.json")

          raw_url = os.environ.get("ECHO_SOURCE_URL", "")
          url = raw_url.strip().strip('"').strip("'")

          if not url:
              raise SystemExit("ECHO_SOURCE_URL is empty")

          if not url.startswith("https://script.google.com/"):
              raise SystemExit("ECHO_SOURCE_URL does not look like a GAS URL")

          try:
              req = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "LnaEchoMirrorGitHubActions/1.0"
                  }
              )
              with urllib.request.urlopen(req, timeout=30) as res:
                  body = res.read()
          except Exception as e:
              # URL本体は出さない。Secret漏れ防止。
              raise SystemExit(f"Failed to fetch JSON from ECHO_SOURCE_URL: {type(e).__name__}")

          if not body:
              raise SystemExit("Fetched JSON is empty")

          src_path.write_bytes(body)

          try:
              data = json.loads(src_path.read_text(encoding="utf-8"))
          except Exception as e:
              raise SystemExit(f"Invalid JSON from source: {type(e).__name__}")

          if data.get("ok") is not True:
              raise SystemExit("Source JSON rejected: ok is not true")

          if data.get("schema") != 3:
              raise SystemExit(f"Source JSON rejected: schema is not 3: {data.get('schema')!r}")

          if "areaGroups" not in data:
              raise SystemExit("Source JSON rejected: areaGroups is missing")

          data["githubMirrorVersion"] = "Lna_EchoMirrorUpdater_GitHubActions_GAS_v01"

          dst_path.write_text(
              json.dumps(data, ensure_ascii=False, separators=(",", ":")),
              encoding="utf-8"
          )
          PY

      - name: Commit and push if changed
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- echo/echo_backup_latest.json; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add echo/echo_backup_latest.json
          git commit -m "Update echo backup mirror from GAS"
          git push
